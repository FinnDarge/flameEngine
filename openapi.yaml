  # ─────────────────────────────────────────────────────────────────────────────
  # Sessions
  # ─────────────────────────────────────────────────────────────────────────────
  /sessions:
    get:
      tags: [Sessions]
      summary: List all sessions
      responses:
        '200':
          description: Array of sessions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'

    post:
      tags: [Sessions]
      summary: Create a session
      description: >
        Creates a new game session for the authenticated player. Returns the
        session UUID and an 8-character join code.
      security:
        - UserKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionInput'
      responses:
        '200':
          description: Session created, returns UUID and join code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/{session}:
    parameters:
      - name: session
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
        description: Session UUID.

    get:
      tags: [Sessions]
      summary: Get a session
      responses:
        '200':
          description: Session details (includes joinCode).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetail'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Sessions]
      summary: Delete a session
      security:
        - ApiKey: []
      responses:
        '204':
          description: Session deleted.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/{session}/join:
    parameters:
      - name: session
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
        description: Session UUID.

    get:
      tags: [Sessions]
      summary: Get session players
      description: Returns the list of players currently in the session with their assigned roles.
      responses:
        '200':
          description: Array of session players.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionPlayer'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Sessions]
      summary: Add player to session
      description: >
        Adds the authenticated player to the session with the specified role.
        If all roles for the game are now filled, session pieces are
        automatically initialized on their starting fields.
      security:
        - UserKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinSessionInput'
      responses:
        '204':
          description: Player joined the session.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/{session}/start:
    parameters:
      - name: session
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
        description: Session UUID.

    post:
      tags: [Sessions]
      summary: Start a session
      description: >
        Starts the session if it is owned by the authenticated player and is ready
        (all roles filled with players, all pieces initialized on their starting fields).
        Marks the session as started.
      security:
        - UserKey: []
      responses:
        '204':
          description: Session started.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found or not owned by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/joinCode/{joinCode}:
    parameters:
      - name: joinCode
        in: path
        required: true
        schema:
          type: string
          minLength: 8
          maxLength: 8
        description: 8-character session join code.

    get:
      tags: [Sessions]
      summary: Look up a session by join code
      description: Redirects (302) to the session endpoint `/api/sessions/{uuid}`.
      responses:
        '302':
          description: Redirect to the resolved session URL.
          headers:
            Location:
              schema:
                type: string
              description: URL of the session, e.g. `/api/sessions/{uuid}`.
        '404':
          description: No session found for the given join code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─────────────────────────────────────────────────────────────────────────────
  # Gameplay
  # ─────────────────────────────────────────────────────────────────────────────
  /sessionBoard:
    get:
      tags: [Gameplay]
      summary: Get session board state
      description: >
        Returns the current state of the board for the given session, with each
        field's UUID, position, NFC ID, and the UUIDs of pieces currently on it.
        Requires user authentication.
      security:
        - UserKey: []
      parameters:
        - name: session
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
          description: Session UUID.
      responses:
        '200':
          description: Array of annotated board fields.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionBoardField'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessionMoves:
    get:
      tags: [Gameplay]
      summary: Get available moves
      description: >
        Returns the fields the authenticated player's piece can move to in the
        current session. Adjacent fields (one step horizontally or vertically)
        are included, each labelled "Move" (empty) or "Join" (occupied).
        Requires user authentication.
      security:
        - UserKey: []
      parameters:
        - name: session
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
          description: Session UUID.
      responses:
        '200':
          description: Array of available moves.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Move'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessionMoves/walk:
    post:
      tags: [Gameplay]
      summary: Walk to a target field
      description: >
        Moves the authenticated player's piece to the specified target field.
        The target should be one of the fields returned by `GET /sessionMoves`.
        Requires user authentication.
      security:
        - UserKey: []
      parameters:
        - name: session
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
          description: Session UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalkInput'
      responses:
        '200':
          description: Move successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalkResult'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
