openapi: 3.1.0
info:
  title: TokenAndBoard API
  version: 1.0.0
  description: >
    Backend API for the TokenAndBoard application.

    **Authentication:**
    - `x-api-key` — required for administrative/write operations (boards, pieces, players, games, roles, game pieces, and app uploads).
    - `x-user-key` — player access token; required for player-scoped operations (creating and joining sessions).

servers:
  - url: /api

components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Server-side API key for administrative operations.
    UserKey:
      type: apiKey
      in: header
      name: x-user-key
      description: Player access token for player-scoped operations.

  schemas:
    UUID:
      type: string
      format: uuid
      example: 123e4567-e89b-12d3-a456-426614174000

    Point:
      type: array
      items:
        type: integer
        minimum: 0
      minItems: 2
      maxItems: 2
      description: A 2D position as [x, y] (non-negative integers).
      example: [3, 5]

    PointObject:
      type: object
      description: A 2D position as returned by the database.
      properties:
        x:
          type: number
        y:
          type: number
      required: [x, y]
      example: { x: 3, y: 5 }

    Error:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
      required: [statusCode, message]

    Board:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 255
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1
      required: [uuid, name, width, height]

    BoardInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1
      required: [name, width, height]

    Field:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        nfcId:
          type: string
        tile:
          type: string
        position:
          $ref: '#/components/schemas/PointObject'
      required: [uuid, nfcId, tile, position]

    FieldInput:
      type: object
      properties:
        board:
          $ref: '#/components/schemas/UUID'
        position:
          $ref: '#/components/schemas/Point'
        tile:
          type: string
          minLength: 1
        nfcId:
          type: string
          minLength: 1
      required: [board, position, tile, nfcId]

    FieldUpdateInput:
      type: object
      properties:
        position:
          $ref: '#/components/schemas/Point'
        tile:
          type: string
          minLength: 1
        nfcId:
          type: string
          minLength: 1
      required: [position, tile, nfcId]

    Piece:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        nfcId:
          type: string
      required: [uuid, name, nfcId]

    PieceInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        nfcId:
          type: string
          minLength: 1
      required: [name, nfcId]

    Player:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 255
        accessToken:
          type: string
          maxLength: 32
      required: [uuid, name, accessToken]

    PlayerInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        accessToken:
          type: string
          minLength: 1
          maxLength: 255
      required: [name, accessToken]

    Game:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 255
        board:
          $ref: '#/components/schemas/UUID'
        code:
          type: string
          maxLength: 255
        inventoryLimit:
          type: integer
          minimum: 0
        weaponLimit:
          type: integer
          minimum: 0
        armorLimit:
          type: integer
          minimum: 0
      required: [uuid, name, board, code, inventoryLimit, weaponLimit, armorLimit]

    GameInput:
      type: object
      properties:
        board:
          $ref: '#/components/schemas/UUID'
        code:
          type: string
          minLength: 1
          maxLength: 255
        name:
          type: string
          minLength: 1
          maxLength: 255
        inventoryLimit:
          type: integer
          minimum: 0
        weaponLimit:
          type: integer
          minimum: 0
        armorLimit:
          type: integer
          minimum: 0
      required: [board, code, name, inventoryLimit, weaponLimit, armorLimit]

    GameUpdateInput:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 255
        name:
          type: string
          minLength: 1
          maxLength: 255
        inventoryLimit:
          type: integer
          minimum: 0
        weaponLimit:
          type: integer
          minimum: 0
        armorLimit:
          type: integer
          minimum: 0
      required: [code, name, inventoryLimit, weaponLimit, armorLimit]

    Role:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 255
      required: [uuid, name]

    RoleInput:
      type: object
      properties:
        game:
          $ref: '#/components/schemas/UUID'
        piece:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          minLength: 1
      required: [game, piece, name]

    RoleUpdateInput:
      type: object
      properties:
        piece:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          minLength: 1
          maxLength: 255
      required: [piece, name]

    GamePiece:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        role:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: 'null'
        roleName:
          oneOf:
            - type: string
            - type: 'null'
        piece:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: 'null'
        pieceName:
          oneOf:
            - type: string
            - type: 'null'
        initialField:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: 'null'
        initialFieldPosition:
          oneOf:
            - $ref: '#/components/schemas/PointObject'
            - type: 'null'
      required: [uuid, role, roleName, piece, pieceName, initialField, initialFieldPosition]

    GamePieceInput:
      type: object
      properties:
        game:
          $ref: '#/components/schemas/UUID'
        role:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: 'null'
        piece:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: 'null'
        initialField:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: 'null'
      required: [game, role, piece, initialField]

    GamePieceUpdateInput:
      type: object
      properties:
        role:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: 'null'
        piece:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: 'null'
        initialField:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: 'null'
      required: [role, piece, initialField]

    Session:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        creator:
          $ref: '#/components/schemas/UUID'
        game:
          $ref: '#/components/schemas/UUID'
      required: [uuid, creator, game]

    SessionCreated:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        joinCode:
          type: string
          minLength: 8
          maxLength: 8
      required: [uuid, joinCode]

    SessionInput:
      type: object
      properties:
        game:
          $ref: '#/components/schemas/UUID'
      required: [game]

    JoinSessionInput:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/UUID'
      required: [role]

    GameDetail:
      type: object
      description: Full game record as returned by the single-game endpoint.
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        board:
          $ref: '#/components/schemas/UUID'
        code:
          type: string
          maxLength: 255
        name:
          type: string
          maxLength: 255
        inventoryLimit:
          type: integer
          minimum: 0
        weaponLimit:
          type: integer
          minimum: 0
        armorLimit:
          type: integer
          minimum: 0
      required: [uuid, board, code, name, inventoryLimit, weaponLimit, armorLimit]

    Item:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 1024
        type:
          type: string
          enum: [weapon, armor, consumable]
        attack:
          type: integer
          minimum: 0
        defense:
          type: integer
          minimum: 0
        consumableHealth:
          type: integer
          minimum: 0
      required: [uuid, name, description, type, attack, defense, consumableHealth]

    ItemInput:
      type: object
      properties:
        game:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          minLength: 1
          maxLength: 1024
        type:
          type: string
          enum: [weapon, armor, consumable]
        attack:
          type: integer
          minimum: 0
        defense:
          type: integer
          minimum: 0
        consumableHealth:
          type: integer
          minimum: 0
      required: [game, name, description, type, attack, defense, consumableHealth]

    ItemUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          minLength: 1
          maxLength: 1024
        type:
          type: string
          enum: [weapon, armor, consumable]
        attack:
          type: integer
          minimum: 0
        defense:
          type: integer
          minimum: 0
        consumableHealth:
          type: integer
          minimum: 0
      required: [name, description, type, attack, defense, consumableHealth]

    GameItem:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        item:
          $ref: '#/components/schemas/UUID'
        itemName:
          oneOf:
            - type: string
            - type: 'null'
        initialField:
          $ref: '#/components/schemas/UUID'
        initialFieldPosition:
          oneOf:
            - $ref: '#/components/schemas/PointObject'
            - type: 'null'
      required: [uuid, item, itemName, initialField, initialFieldPosition]

    GameItemInput:
      type: object
      properties:
        game:
          $ref: '#/components/schemas/UUID'
        item:
          $ref: '#/components/schemas/UUID'
        initialField:
          $ref: '#/components/schemas/UUID'
      required: [game, item, initialField]

    GameItemUpdateInput:
      type: object
      properties:
        item:
          $ref: '#/components/schemas/UUID'
        initialField:
          $ref: '#/components/schemas/UUID'
      required: [item, initialField]

    RoleDetail:
      type: object
      description: Full role record as returned by the single-role endpoint.
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        game:
          $ref: '#/components/schemas/UUID'
        piece:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 255
      required: [uuid, game, piece, name]

    SessionDetail:
      type: object
      description: Full session record as returned by the single-session endpoint.
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        creator:
          $ref: '#/components/schemas/UUID'
        game:
          $ref: '#/components/schemas/UUID'
        joinCode:
          type: string
          minLength: 8
          maxLength: 8
      required: [uuid, creator, game, joinCode]

    SessionBoardField:
      type: object
      description: A board field annotated with the pieces currently on it.
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        position:
          $ref: '#/components/schemas/PointObject'
        nfcId:
          oneOf:
            - type: string
            - type: 'null'
        pieces:
          type: array
          items:
            $ref: '#/components/schemas/UUID'
          description: UUIDs of pieces currently on this field.
      required: [uuid, position, nfcId, pieces]

    Move:
      type: object
      description: An available move for the current player.
      properties:
        field:
          $ref: '#/components/schemas/UUID'
        label:
          type: string
          description: '"Move" if the field is empty, "Join" if occupied.'
          example: Move
      required: [field]

    WalkInput:
      type: object
      properties:
        target:
          $ref: '#/components/schemas/UUID'
      required: [target]

    WalkResult:
      type: object
      properties:
        message:
          type: string
          example: Piece moved successfully
      required: [message]

    SessionPlayer:
      type: object
      description: A player's assignment to a role in a session.
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        session:
          $ref: '#/components/schemas/UUID'
        player:
          $ref: '#/components/schemas/UUID'
        role:
          $ref: '#/components/schemas/UUID'
      required: [uuid, session, player, role]

paths:
  # ─────────────────────────────────────────────────────────────────────────────
  # App
  # ─────────────────────────────────────────────────────────────────────────────
  /app/android:
    get:
      tags: [App]
      summary: Download Android APK
      description: Returns the current Android APK as a binary file download.
      responses:
        '200':
          description: APK file.
          content:
            application/vnd.android.package-archive:
              schema:
                type: string
                format: binary

    put:
      tags: [App]
      summary: Upload Android APK
      description: Replaces the stored Android APK. Requires API key.
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: APK uploaded successfully.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─────────────────────────────────────────────────────────────────────────────
  # Boards
  # ─────────────────────────────────────────────────────────────────────────────
  /boards:
    get:
      tags: [Boards]
      summary: List all boards
      responses:
        '200':
          description: Array of boards.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Board'

    post:
      tags: [Boards]
      summary: Create a board
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardInput'
      responses:
        '204':
          description: Board created.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /boards/{board}:
    parameters:
      - name: board
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
        description: Board UUID.

    get:
      tags: [Boards]
      summary: Get a board
      responses:
        '200':
          description: Board details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
        '404':
          description: Board not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Boards]
      summary: Update a board
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardInput'
      responses:
        '204':
          description: Board updated.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Boards]
      summary: Delete a board
      security:
        - ApiKey: []
      responses:
        '204':
          description: Board deleted.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─────────────────────────────────────────────────────────────────────────────
  # Fields
  # ─────────────────────────────────────────────────────────────────────────────
  /fields:
    get:
      tags: [Fields]
      summary: List fields for a board
      parameters:
        - name: board
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
          description: Board UUID to filter fields by.
      responses:
        '200':
          description: Array of fields.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Field'

    post:
      tags: [Fields]
      summary: Create a field
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldInput'
      responses:
        '204':
          description: Field created.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /fields/{field}:
    parameters:
      - name: field
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
        description: Field UUID.

    get:
      tags: [Fields]
      summary: Get a field
      responses:
        '200':
          description: Field details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Field'
        '404':
          description: Field not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Fields]
      summary: Update a field
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldUpdateInput'
      responses:
        '204':
          description: Field updated.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Fields]
      summary: Delete a field
      security:
        - ApiKey: []
      responses:
        '204':
          description: Field deleted.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─────────────────────────────────────────────────────────────────────────────
  # Pieces
  # ─────────────────────────────────────────────────────────────────────────────
  /pieces:
    get:
      tags: [Pieces]
      summary: List all pieces
      responses:
        '200':
          description: Array of pieces.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Piece'

    post:
      tags: [Pieces]
      summary: Create a piece
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PieceInput'
      responses:
        '204':
          description: Piece created.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /pieces/{piece}:
    parameters:
      - name: piece
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
        description: Piece UUID.

    get:
      tags: [Pieces]
      summary: Get a piece
      responses:
        '200':
          description: Piece details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Piece'
        '404':
          description: Piece not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Pieces]
      summary: Update a piece
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PieceInput'
      responses:
        '204':
          description: Piece updated.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Pieces]
      summary: Delete a piece
      security:
        - ApiKey: []
      responses:
        '204':
          description: Piece deleted.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─────────────────────────────────────────────────────────────────────────────
  # Items
  # ─────────────────────────────────────────────────────────────────────────────
  /items:
    get:
      tags: [Items]
      summary: List items for a game
      parameters:
        - name: game
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
          description: Game UUID to filter items by.
      responses:
        '200':
          description: Array of items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'

    post:
      tags: [Items]
      summary: Create an item
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemInput'
      responses:
        '204':
          description: Item created.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /items/{item}:
    parameters:
      - name: item
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
        description: Item UUID.

    get:
      tags: [Items]
      summary: Get an item
      responses:
        '200':
          description: Item details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Items]
      summary: Update an item
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdateInput'
      responses:
        '204':
          description: Item updated.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Items]
      summary: Delete an item
      security:
        - ApiKey: []
      responses:
        '204':
          description: Item deleted.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─────────────────────────────────────────────────────────────────────────────
  # Players
  # ─────────────────────────────────────────────────────────────────────────────
  /players:
    get:
      tags: [Players]
      summary: List all players
      responses:
        '200':
          description: Array of players.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'

    post:
      tags: [Players]
      summary: Create a player
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerInput'
      responses:
        '204':
          description: Player created.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /players/{player}:
    parameters:
      - name: player
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
        description: Player UUID.

    get:
      tags: [Players]
      summary: Get a player
      responses:
        '200':
